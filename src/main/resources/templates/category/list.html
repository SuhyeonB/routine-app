<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>카테고리</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">

<div class="max-w-lg mx-auto px-4 py-8">

    <!-- 헤더 -->
    <div class="flex items-center gap-3 mb-6">
        <a href="/" class="text-gray-400 text-sm">← 뒤로</a>
        <h1 class="text-2xl font-bold text-gray-800">카테고리</h1>
    </div>

    <!-- 카테고리 목록 -->
    <div class="flex flex-col gap-3 mb-6">
        <div th:each="category : ${categories}"
             class="bg-white rounded-2xl px-5 py-4 shadow-sm flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-4 h-4 rounded-full" th:style="'background-color:' + ${category.color}"></div>
                <p th:text="${category.name}" class="font-medium text-gray-800"></p>
            </div>
            <form th:action="@{/categories/{id}/delete(id=${category.id})}" method="post">
                <button type="submit" class="text-gray-300 hover:text-red-400 text-sm">삭제</button>
            </form>
        </div>
    </div>

    <!-- 카테고리 추가 폼 -->
    <div class="bg-white rounded-2xl px-5 py-4 shadow-sm">
        <p class="text-xs text-gray-400 mb-3">새 카테고리 추가</p>
        <form action="/categories" method="post" class="flex flex-col gap-3">
            <input type="text" name="name" placeholder="카테고리 이름"
                   class="w-full text-gray-800 outline-none border-b border-gray-100 pb-2"/>
            <div class="flex items-center gap-3">
                <label class="text-xs text-gray-400">색상</label>
                <input type="color" name="color" value="#000000"
                       class="w-8 h-8 rounded-full cursor-pointer border-0"/>
            </div>
            <button type="submit"
                    class="w-full bg-black text-white rounded-full py-3 font-medium mt-1">
                추가
            </button>
        </form>
    </div>

</div>

</body>
</html>
