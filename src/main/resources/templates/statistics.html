<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>통계</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">

<div class="max-w-lg mx-auto px-4 py-8">

    <!-- 헤더 -->
    <div class="flex items-center gap-3 mb-6">
        <a href="/" class="text-gray-400 text-sm">← 뒤로</a>
        <h1 class="text-2xl font-bold text-gray-800">통계</h1>
    </div>

    <!-- 주간 통계 -->
    <div class="mb-8">
        <h2 class="text-lg font-bold text-gray-700 mb-3">주간 달성 현황</h2>
        <p class="text-xs text-gray-400 mb-4"
           th:text="${weekStart + ' ~ ' + weekEnd}"></p>

        <div class="bg-white rounded-2xl shadow-sm overflow-x-auto">
            <table class="w-full text-sm">
                <thead>
                <tr class="border-b border-gray-100">
                    <th class="text-left px-4 py-3 text-gray-400 font-normal">루틴</th>
                    <th th:each="day : ${weekStats[0].days}"
                        class="text-center px-2 py-3 text-gray-400 font-normal"
                        th:text="${#temporals.format(day.date, 'E')}"></th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="stat : ${weekStats}" class="border-b border-gray-50 last:border-0">
                    <td class="px-4 py-3">
                        <div class="flex items-center gap-2">
                            <div class="w-3 h-3 rounded-full flex-shrink-0"
                                 th:style="${stat.routine.category != null} ? 'background-color:' + ${stat.routine.category.color} : 'background-color:#e5e7eb'">
                            </div>
                            <span class="text-gray-700 font-medium" th:text="${stat.routine.title}"></span>
                        </div>
                    </td>
                    <td th:each="day : ${stat.days}" class="text-center px-2 py-3">
                        <span th:if="${day.checked}"
                              class="inline-block w-6 h-6 rounded-full bg-black"></span>
                        <span th:if="${!day.checked and day.scheduled}"
                              class="inline-block w-6 h-6 rounded-full bg-gray-100"></span>
                        <span th:if="${!day.scheduled}"
                              class="inline-block w-6 h-6 rounded-full bg-gray-50"></span>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- 월간 통계 -->
    <div>
        <h2 class="text-lg font-bold text-gray-700 mb-3">월간 달성 현황</h2>
        <p class="text-xs text-gray-400 mb-4" th:text="${yearMonth}"></p>

        <div class="flex flex-col gap-4">
            <div th:each="stat : ${monthStats}"
                 class="bg-white rounded-2xl px-5 py-4 shadow-sm">

                <!-- 루틴명 + 달성률 -->
                <div class="flex justify-between items-center mb-3">
                    <div class="flex items-center gap-2">
                        <div class="w-3 h-3 rounded-full flex-shrink-0"
                             th:style="${stat.routine.category != null} ? 'background-color:' + ${stat.routine.category.color} : 'background-color:#e5e7eb'">
                        </div>
                        <p class="font-medium text-gray-800" th:text="${stat.routine.title}"></p>
                    </div>
                    <div class="flex items-center gap-2 text-xs text-gray-400">
                        <span th:text="${stat.achievementRate + '%'}"></span>
                        <span th:text="'✓ ' + ${stat.checkedCount}"></span>
                    </div>
                </div>

                <!-- 달력 -->
                <div class="grid grid-cols-7 gap-1">
                    <div th:each="day : ${stat.days}"
                         class="aspect-square rounded flex items-center justify-center text-xs"
                         th:classappend="${day.checked} ? 'bg-black text-white' : (${day.scheduled} ? 'bg-gray-100 text-gray-400' : 'bg-gray-50 text-gray-300')"
                         th:text="${day.date.dayOfMonth}">
                    </div>
                </div>
            </div>
        </div>
    </div>

</div>

</body>
</html>
